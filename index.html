<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Dashboard Pro</title>
    <style>
        :root { --rail-blue: #003366; --panel-bg: #222; --text-green: #00ff00; }
        body { font-family: 'Courier New', Courier, monospace; margin: 0; background: #111; color: #eee; display: grid; grid-template-columns: 1fr 380px; height: 100vh; overflow: hidden; }
        
        /* メインパネル */
        main { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .card { background: var(--panel-bg); border: 2px solid #444; padding: 20px; border-radius: 10px; }
        
        /* 速度計エリア */
        .gauge-container { text-align: center; position: relative; }
        #speed-gauge { width: 300px; height: 180px; }
        .speed-digital { font-size: 3em; color: var(--text-green); text-shadow: 0 0 10px var(--text-green); }

        /* テレメトリグリッド */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-item { background: #333; padding: 10px; border-radius: 5px; border-left: 4px solid var(--rail-blue); }
        .label { font-size: 0.8em; color: #aaa; display: block; }
        .value { font-size: 1.2em; font-weight: bold; color: var(--text-green); }

        /* サイドバー（駅ログ） */
        aside { background: #001a33; padding: 20px; overflow-y: auto; border-left: 3px solid #004080; }
        .station-log { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #0055ff; }
        .station-name { font-size: 1.2em; color: #fff; font-weight: bold; }
        
        button { background: #444; color: white; border: 1px solid #666; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #555; }
        @media (max-width: 900px) { body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<main>
    <div class="card gauge-container">
        <canvas id="speed-gauge"></canvas>
        <div class="speed-digital"><span id="speed-num">0</span> <small style="font-size: 0.4em;">km/h</small></div>
    </div>

    <div class="card">
        <h3>🛰️ 運行テレメトリ</h3>
        <div class="stats-grid">
            <div class="stat-item"><span class="label">緯度</span><span class="value" id="lat">--</span></div>
            <div class="stat-item"><span class="label">経度</span><span class="value" id="lon">--</span></div>
            <div class="stat-item"><span class="label">高度</span><span class="value" id="alt">--</span></div>
            <div class="stat-item"><span class="label">進行方位</span><span class="value" id="heading">--</span></div>
            <div class="stat-item"><span class="label">位置精度</span><span class="value" id="acc">--</span></div>
            <div class="stat-item"><span class="label">現在時刻</span><span class="value" id="clock">--</span></div>
        </div>
    </div>

    <div class="card">
        <span class="label">現在位置付近の住所</span>
        <div id="address" style="font-size: 0.9em; margin-top: 5px;">取得中...</div>
        <button onclick="openMap()">Google Maps 展望画面</button>
    </div>
</main>

<aside>
    <h3 style="border-bottom: 2px solid #0055ff; padding-bottom: 10px;">🕒 クラウド停車記録</h3>
    <div id="station-list">接続中...</div>
</aside>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // あなたのFirebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyBSQeJUklIBwOF8Hq1rJHag7ujW3FjcugM",
        authDomain: "mystationlog-ac840.firebaseapp.com",
        projectId: "mystationlog-ac840",
        storageBucket: "mystationlog-ac840.firebasestorage.app",
        messagingSenderId: "601219479756",
        appId: "1:601219479756:web:05313f83b955731dc96a69",
        measurementId: "G-GT4DEJ7V14"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const stationCol = collection(db, "stations");

    let lastPos = { lat: 0, lon: 0 };
    let knownStations = new Set();

    // 1. 速度計の描画 (Canvas)
    const canvas = document.getElementById('speed-gauge');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 180;

    function drawGauge(speed) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = 150, centerY = 160, radius = 130;
        
        // メーターの枠
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
        ctx.strokeStyle = '#444'; ctx.lineWidth = 15; ctx.stroke();

        // 速度目盛り
        const angle = Math.PI + (Math.min(speed, 160) / 160) * Math.PI;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, Math.PI, angle);
        ctx.strokeStyle = var(--text-green); ctx.lineWidth = 15; ctx.stroke();

        // 針
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(radius - 20, 0);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
        ctx.restore();
    }

    // 2. Firebase同期
    const q = query(stationCol, orderBy("time", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('station-list');
        list.innerHTML = "";
        snapshot.forEach(doc => {
            const s = doc.data();
            knownStations.add(s.name);
            list.innerHTML += `<div class="station-log">
                <div class="station-name">${s.name}駅</div>
                <div style="font-size:0.8em; color:#aaa;">${s.line}</div>
                <div style="font-size:0.7em; color:var(--text-green); margin-top:5px;">🕒 ${s.time}</div>
            </div>`;
        });
    });

    // 3. メイン処理 (Geolocation)
    navigator.geolocation.watchPosition(async (pos) => {
        const c = pos.coords;
        lastPos.lat = c.latitude;
        lastPos.lon = c.longitude;

        // 数値表示更新
        document.getElementById('lat').textContent = c.latitude.toFixed(5);
        document.getElementById('lon').textContent = c.longitude.toFixed(5);
        document.getElementById('alt').textContent = c.altitude ? Math.round(c.altitude) + "m" : "0m";
        document.getElementById('heading').textContent = c.heading ? Math.round(c.heading) + "°" : "--";
        document.getElementById('acc').textContent = "±" + Math.round(c.accuracy) + "m";
        
        const kmh = c.speed ? Math.round(c.speed * 3.6) : 0;
        document.getElementById('speed-num').textContent = kmh;
        drawGauge(kmh);

        // 住所取得
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.latitude}&lon=${c.longitude}`)
            .then(r => r.json()).then(d => document.getElementById('address').textContent = d.display_name);

        // 最寄り駅保存
        try {
            const res = await fetch(`https://express.heartrails.com/api/json?method=getStations&x=${c.longitude}&y=${c.latitude}`);
            const data = await res.json();
            const s = data.response.station?.[0];
            if (s && !knownStations.has(s.name)) {
                await addDoc(stationCol, { name: s.name, line: s.line, time: new Date().toLocaleString('ja-JP') });
            }
        } catch (e) {}
    }, null, { enableHighAccuracy: true });

    // 時計
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    window.openMap = () => window.open(`https://www.google.com/maps?q=${lastPos.lat},${lastPos.lon}`);
    drawGauge(0);
</script>

</body>
</html>
