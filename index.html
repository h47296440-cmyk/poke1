<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Dashboard Pro - Trace & JSON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gauge-size: 260px; --accent: #0f0; --panel-bg: #1a1a1a; }
        body { font-family: monospace; background: var(--panel-bg); color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .top-panel { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; background: #222; border-bottom: 2px solid #333; }
        
        /* 速度計 */
        .gauge-outer { width: var(--gauge-size); height: var(--gauge-size); background: #f0f0f0; border-radius: 15px; border: 10px solid #111; position: relative; flex-shrink: 0; }
        .gauge-inner { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; background: #fff; border-radius: 50%; overflow: hidden; }
        #gauge-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .num { position: absolute; color: #333; font-weight: bold; font-family: Arial; font-size: 28px; z-index: 1; }
        .n0 { bottom: 20px; left: 50px; } .n80 { top: 15px; left: 50%; transform: translateX(-50%); font-size: 34px; } .n160 { bottom: 20px; right: 50px; }
        .kmh-label { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #333; font-size: 24px; font-weight: bold; z-index: 1; }

        /* マップ */
        #map { flex-grow: 1; min-width: 300px; height: var(--gauge-size); border-radius: 10px; border: 2px solid #444; }

        /* 下部パネル */
        .bottom-panel { flex-grow: 1; display: grid; grid-template-columns: 240px 1fr; overflow: hidden; }
        .stats { background: #111; padding: 15px; border-right: 1px solid #333; font-size: 12px; color: var(--accent); display: flex; flex-direction: column; }
        .log-container { background: #000; overflow-y: auto; padding: 10px; }
        .log-entry { padding: 8px; border-bottom: 1px solid #222; font-size: 13px; }
        
        .btn { background: #444; color: #fff; border: none; padding: 8px; cursor: pointer; font-size: 11px; margin-top: 5px; border-radius: 4px; }
        .btn-json { background: #0055ff; font-weight: bold; margin-top: auto; }
        h3 { margin: 0 0 8px 0; font-size: 13px; border-bottom: 1px solid #444; padding-bottom: 4px; color: #fff; }
    </style>
</head>
<body>

<div class="top-panel">
    <div class="gauge-outer">
        <div class="gauge-inner">
            <canvas id="gauge-canvas"></canvas>
            <div class="num n0">0</div>
            <div class="num n80">80</div>
            <div class="num n160">160</div>
            <div class="kmh-label">km/h</div>
        </div>
    </div>
    <div id="map"></div>
</div>

<div class="bottom-panel">
    <div class="stats">
        <h3>🛰️ TELEMETRY</h3>
        LAT: <span id="lat">---</span><br>
        LON: <span id="lon">---</span><br>
        ALT: <span id="alt">---</span><br>
        ACC: ±<span id="acc">---</span>m<br><br>
        <h3>🛠️ TOOLS</h3>
        <button class="btn" onclick="clearLog()">履歴リセット</button>
        <button class="btn btn-json" onclick="downloadJSON()">JSONを書き出す</button>
    </div>
    <div class="log-container">
        <h3>🕒 STATION LOG</h3>
        <div id="log-list"></div>
    </div>
</div>

<script>
    let stationLogs = JSON.parse(localStorage.getItem('my_station_logs') || '[]');
    let trackPoints = JSON.parse(localStorage.getItem('my_track_points') || '[]');
    let map, marker, polyline;

    const canvas = document.getElementById('gauge-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 300;

    // --- 速度計 描画 ---
    function drawGauge(speed) {
        ctx.clearRect(0, 0, 300, 300);
        const cx = 150, cy = 150, r = 125;
        const start = Math.PI * 0.75;
        const end = Math.PI * 2.25;
        const current = start + (Math.min(speed, 160) / 160) * (end - start);

        ctx.save(); ctx.translate(cx, cy);
        for (let i = 0; i <= 160; i += 2) {
            ctx.save();
            ctx.rotate(start - Math.PI/2 + (i/160)*(end-start));
            ctx.beginPath();
            ctx.moveTo(0, -r); ctx.lineTo(0, i % 10 === 0 ? -r+15 : -r+5);
            ctx.strokeStyle = i % 10 === 0 ? '#333' : '#bbb';
            ctx.lineWidth = i % 10 === 0 ? 3 : 1;
            ctx.stroke(); ctx.restore();
        }
        ctx.rotate(current + Math.PI/2);
        ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(0, -r+10);
        ctx.strokeStyle = '#d00'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
        ctx.restore();
    }

    // --- 地図 ＆ 軌跡 ---
    function initMap(lat, lon) {
        map = L.map('map').setView([lat, lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([lat, lon]).addTo(map);
        // 軌跡用ライン
        polyline = L.polyline(trackPoints, {color: '#0055ff', weight: 5, opacity: 0.7}).addTo(map);
    }

    window.onload = () => {
        renderLog();
        drawGauge(0);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
        }
    };

    async function updatePosition(pos) {
        const { latitude, longitude, speed, altitude, accuracy } = pos.coords;
        const kmh = speed ? speed * 3.6 : 0;
        const latlng = [latitude, longitude];

        // テレメトリ更新
        document.getElementById('lat').textContent = latitude.toFixed(5);
        document.getElementById('lon').textContent = longitude.toFixed(5);
        document.getElementById('alt').textContent = altitude ? Math.round(altitude) + "m" : "0m";
        document.getElementById('acc').textContent = Math.round(accuracy);
        drawGauge(kmh);

        // 軌跡の追加と保存（精度が良い時だけ保存）
        if (accuracy < 50) {
            trackPoints.push(latlng);
            if(trackPoints.length > 2000) trackPoints.shift(); // メモリ節約
            localStorage.setItem('my_track_points', JSON.stringify(trackPoints));
        }

        // 地図更新
        if (!map) {
            initMap(latitude, longitude);
        } else {
            marker.setLatLng(latlng);
            polyline.setLatLngs(trackPoints);
            map.panTo(latlng);
        }

        // 駅取得
        try {
            const res = await fetch(`https://express.heartrails.com/api/json?method=getStations&x=${longitude}&y=${latitude}`);
            const data = await res.json();
            const s = data.response.station?.[0];
            if (s && !stationLogs.some(i => i.name === s.name)) {
                stationLogs.unshift({ name: s.name, line: s.line, time: new Date().toLocaleString('ja-JP'), lat: latitude, lon: longitude });
                localStorage.setItem('my_station_logs', JSON.stringify(stationLogs));
                renderLog();
            }
        } catch (e) {}
    }

    function renderLog() {
        const list = document.getElementById('log-list');
        list.innerHTML = stationLogs.map(s => `
            <div class="log-entry">
                <b>${s.name}駅</b> <small>(${s.line})</small><br>
                <span style="font-size:10px; color:#888;">${s.time}</span>
            </div>
        `).join('');
    }

    // --- JSONダウンロード機能 ---
    function downloadJSON() {
        const fullData = {
            export_date: new Date().toISOString(),
            stations: stationLogs,
            track: trackPoints
        };
        const blob = new Blob([JSON.stringify(fullData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `station_trace_${new Date().getTime()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearLog() {
        if(confirm("全てのデータを消去しますか？")) {
            stationLogs = []; trackPoints = [];
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
