<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Dashboard - Integrated Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --accent: #0f0; --panel-bg: #111; --danger: #ff4444; --warning: #ffaa00; }
        body { font-family: 'Share Tech Mono', monospace; background: var(--panel-bg); color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .top-panel { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; background: #222; border-bottom: 2px solid #333; position: relative; }
        .gauge-container { width: 260px; height: 260px; background: #f8f8f8; border-radius: 15px; border: 10px solid #111; position: relative; flex-shrink: 0; }
        #gauge-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .gauge-center-digit { position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%); color: #333; font-size: 24px; font-weight: bold; z-index: 3; text-align: center; }
        #map { flex-grow: 1; min-width: 300px; height: 260px; border-radius: 10px; border: 2px solid #444; }

        .settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(0,0,0,0.6); border: 1px solid #555; color: #fff; padding: 8px 12px; border-radius: 5px; cursor: pointer; }

        .bottom-panel { flex-grow: 1; display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }
        .panel { padding: 15px; border-right: 1px solid #333; overflow-y: auto; background: #000; }
        
        /* Stats Styles */
        .speed-display { background: #111; padding: 10px; border-radius: 8px; border-left: 5px solid var(--accent); margin-bottom: 10px; }
        .speed-val { font-size: 40px; font-weight: bold; color: #fff; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .data-box { background: #1a1a1a; padding: 8px; border-radius: 4px; border: 1px solid #333; }
        .data-label { color: #888; font-size: 9px; display: block; }
        .data-num { color: #fff; font-size: 16px; font-weight: bold; }

        /* Buttons */
        .btn-share { background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-share:active { background: #ccc; }
        .btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; cursor: pointer; font-size: 12px; border-radius: 4px; width: 100%; margin: 5px 0; }

        /* Logs & Modal */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 600px; margin: 0 auto; background: #222; padding: 20px; border-radius: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; font-size: 12px; }
        .log-entry { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; color: #fff; }
        h3 { margin: 15px 0 8px 0; font-size: 12px; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 4px; }
        .status-badge { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="top-panel">
    <div class="gauge-container">
        <canvas id="gauge-canvas"></canvas>
        <div class="gauge-center-digit"><span id="center-speed">0</span><div style="font-size:10px;">km/h</div></div>
    </div>
    <div id="map"></div>
    <div class="settings-trigger" onclick="toggleSettings()">⚙ SETTINGS</div>
</div>

<div class="bottom-panel">
    <div class="panel stats">
        <div style="display:flex; align-items:center; margin-bottom:10px;">
            <span style="font-size:10px; color:#888;">AUTO-SCAN</span>
            <span class="status-badge">ACTIVE</span>
        </div>
        
        <h3>⚡ REALTIME</h3>
        <div class="speed-display"><span id="speed-dg" class="speed-val">0.0</span><small>km/h</small></div>
        <div class="data-grid">
            <div class="data-box"><span class="data-label">MAX</span><span id="max-speed" class="data-num">0</span></div>
            <div class="data-box"><span class="data-label">G-FORCE</span><span id="accel" class="data-num">0.0</span></div>
        </div>

        <button class="btn-share" onclick="nativeShare()">SHARE REPORT</button>

        <h3>📏 DISTANCE</h3>
        <div class="data-box" style="margin-bottom:8px;"><span class="data-label">TODAY</span><span id="dist-today" class="data-num" style="color:var(--accent);">0.00</span><small> km</small></div>
        <div class="data-box"><span class="data-label">TOTAL</span><span id="dist-total" class="data-num">0.00</span><small> km</small></div>
        
        <div style="font-size:11px; margin-top:10px; color:#666;">
            ALT: <span id="alt" style="color:#aaa;">---</span> m | ACC: ±<span id="acc" style="color:#aaa;">---</span> m
        </div>
    </div>

    <div class="panel log-container">
        <h3>🕒 TRIP LOGS (AUTO-RECORD)</h3>
        <div id="log-list"></div>
    </div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; font-size:18px;">⚙ SETTINGS & HISTORY</h2>
            <button onclick="toggleSettings()" style="background:none; border:none; color:#fff; font-size:24px;">×</button>
        </div>

        <h3>📅 DAILY HISTORY (過去30日)</h3>
        <div id="history-list" style="max-height:150px; overflow-y:auto; background:#111; padding:10px; border-radius:4px; margin-bottom:10px;"></div>

        <h3>🛠 GAUGE SCALE</h3>
        <div style="display:flex; gap:5px;">
            <button class="btn" onclick="setScale(160)">160</button>
            <button class="btn" onclick="setScale(400)">400</button>
            <button class="btn" onclick="setScale(1200)">1200</button>
        </div>

        <h3>📂 DATA MANAGEMENT</h3>
        <button class="btn" style="background:#0044cc;" onclick="downloadJSON()">履歴をJSONで書き出す</button>
        <label class="btn" style="display:block; text-align:center;">JSONから復元<input type="file" id="import-json" accept=".json" style="display:none;"></label>
        <button class="btn" onclick="clearLog()" style="color:var(--danger); margin-top:10px;">全データをリセット</button>
    </div>
</div>

<script>
    // 主要駅サンプル（GPS自動判定用）
    const stationMaster = [
        {name: "東京", lat: 35.681236, lon: 139.767125},
        {name: "品川", lat: 35.628471, lon: 139.73876},
        {name: "新横浜", lat: 35.507456, lon: 139.617585},
        {name: "名古屋", lat: 35.170915, lon: 136.881537},
        {name: "京都", lat: 34.985849, lon: 135.758767},
        {name: "新大阪", lat: 34.73348, lon: 135.500109}
    ];

    let stationLogs = JSON.parse(localStorage.getItem('my_station_logs') || '[]');
    let trackPoints = JSON.parse(localStorage.getItem('my_track_points') || '[]');
    let dailyHistory = JSON.parse(localStorage.getItem('my_daily_history') || '[]');
    let totalDist = parseFloat(localStorage.getItem('my_total_dist') || '0');
    let todayDist = parseFloat(localStorage.getItem('my_today_dist') || '0');
    let lastDate = localStorage.getItem('my_last_date') || new Date().toDateString();
    let maxSpeed = parseFloat(localStorage.getItem('my_max_speed') || '0');
    let maxRange = parseInt(localStorage.getItem('my_max_range') || '160');

    let map, marker, polyline;
    let lastTime = Date.now(), lastSpeed = 0, lastCoord = null, lastInStation = null;
    const canvas = document.getElementById('gauge-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 300;

    // --- 自動駅チェック ---
    function checkStationAuto(lat, lon, speed) {
        let nearest = null;
        let threshold = 0.5; // 500m
        stationMaster.forEach(st => {
            let d = getDistance({lat: lat, lon: lon}, {lat: st.lat, lon: st.lon});
            if (d < threshold) { nearest = st; threshold = d; }
        });

        if (nearest) {
            if (lastInStation !== nearest.name) {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                stationLogs.unshift({ name: nearest.name, time: timeStr, speed: speed.toFixed(1) });
                localStorage.setItem('my_station_logs', JSON.stringify(stationLogs));
                renderLog();
                lastInStation = nearest.name;
            }
        } else { lastInStation = null; }
    }

    // --- 標準シェア ---
    async function nativeShare() {
        const report = `【Railway Report】\n速度: ${lastSpeed.toFixed(1)} km/h\n本日走行: ${todayDist.toFixed(2)} km\n高度: ${document.getElementById('alt').textContent} m`;
        if (navigator.share) {
            try { await navigator.share({ title: 'Railway Dash', text: report }); } catch (e) {}
        } else {
            navigator.clipboard.writeText(report).then(() => alert("コピーしました"));
        }
    }

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        if(modal.style.display === 'block') renderHistory();
    }

    function drawGauge(speed) {
        ctx.clearRect(0, 0, 300, 300);
        const cx = 150, cy = 150, r = 125, startRad = Math.PI * 0.75, totalAngle = Math.PI * 1.5;
        const currentSpeed = Math.min(speed, maxRange);
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(startRad);
        const tickStep = maxRange / 8;
        for (let i = 0; i <= maxRange; i += tickStep / 5) {
            const isMajor = i % tickStep === 0;
            const angle = (i / maxRange) * totalAngle;
            ctx.save(); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(isMajor ? r-18 : r-8, 0);
            ctx.strokeStyle = isMajor ? '#111' : '#888'; ctx.lineWidth = isMajor ? 3 : 1; ctx.stroke();
            if (isMajor) {
                ctx.translate(r - 38, 0); ctx.rotate(-angle - startRad);
                ctx.fillStyle = '#222'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(Math.round(i), 0, 0);
            }
            ctx.restore();
        }
        ctx.restore();
        const currentAngle = startRad + (currentSpeed / maxRange) * totalAngle;
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(currentAngle);
        ctx.beginPath(); ctx.moveTo(-25, 0); ctx.lineTo(r-5, 0);
        ctx.strokeStyle = '#e30000'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
        ctx.restore();
    }

    function getDistance(c1, c2) {
        const R = 6371;
        const dLat = (c2.lat - c1.lat) * Math.PI / 180;
        const dLon = (c2.lon - c1.lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(c1.lat * Math.PI/180) * Math.cos(c2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function setScale(range) {
        maxRange = range; localStorage.setItem('my_max_range', maxRange); drawGauge(lastSpeed);
    }

    document.getElementById('import-json').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                localStorage.setItem('my_station_logs', JSON.stringify(data.stations || []));
                localStorage.setItem('my_daily_history', JSON.stringify(data.dailyHistory || []));
                localStorage.setItem('my_total_dist', data.totalDist || 0);
                location.reload();
            } catch (err) { alert("形式が正しくありません"); }
        };
        reader.readAsText(file);
    });

    window.onload = () => {
        const todayStr = new Date().toDateString();
        if (lastDate !== todayStr) {
            if (todayDist > 0) {
                dailyHistory.unshift({ date: lastDate, dist: todayDist.toFixed(2) });
                if(dailyHistory.length > 30) dailyHistory.pop();
                localStorage.setItem('my_daily_history', JSON.stringify(dailyHistory));
            }
            todayDist = 0; localStorage.setItem('my_today_dist', 0); localStorage.setItem('my_last_date', todayStr);
        }
        renderLog(); drawGauge(0);
        document.getElementById('dist-total').textContent = totalDist.toFixed(2);
        document.getElementById('dist-today').textContent = todayDist.toFixed(2);
        document.getElementById('max-speed').textContent = Math.round(maxSpeed);
        if (navigator.geolocation) navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
    };

    function updatePosition(pos) {
        const { latitude, longitude, speed, altitude, accuracy } = pos.coords;
        const kmh = speed ? speed * 3.6 : 0;
        const now = Date.now();

        if (kmh > maxSpeed) { maxSpeed = kmh; localStorage.setItem('my_max_speed', maxSpeed); }
        const dt = (now - lastTime) / 1000;
        const gForce = dt > 0 ? ((kmh - lastSpeed) / dt).toFixed(1) : "0.0";
        
        if (lastCoord && accuracy < 30) {
            const d = getDistance(lastCoord, {lat: latitude, lon: longitude});
            if (d > 0.002) { 
                totalDist += d; todayDist += d;
                localStorage.setItem('my_total_dist', totalDist); 
                localStorage.setItem('my_today_dist', todayDist); 
            }
        }

        checkStationAuto(latitude, longitude, kmh);

        document.getElementById('speed-dg').textContent = kmh.toFixed(1);
        document.getElementById('center-speed').textContent = Math.round(kmh);
        document.getElementById('max-speed').textContent = Math.round(maxSpeed);
        document.getElementById('accel').textContent = gForce;
        document.getElementById('dist-total').textContent = totalDist.toFixed(2);
        document.getElementById('dist-today').textContent = todayDist.toFixed(2);
        document.getElementById('alt').textContent = altitude ? Math.round(altitude) : "---";
        document.getElementById('acc').textContent = Math.round(accuracy);
        
        drawGauge(kmh);
        updateMap(latitude, longitude);
        lastTime = now; lastSpeed = kmh; lastCoord = {lat: latitude, lon: longitude};
    }

    function updateMap(lat, lon) {
        if (!map) {
            map = L.map('map').setView([lat, lon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([lat, lon]).addTo(map);
        } else {
            marker.setLatLng([lat, lon]); map.panTo([lat, lon]);
        }
    }

    function renderLog() {
        document.getElementById('log-list').innerHTML = stationLogs.map(s => `<div class="log-entry"><b>🚉 ${s.name}</b> <small>(${s.time})</small> <span style="float:right; color:var(--accent);">${s.speed} km/h</span></div>`).join('');
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = dailyHistory.length > 0 ? 
            dailyHistory.map(h => `<div class="history-item"><span>${h.date}</span><b>${h.dist} km</b></div>`).join('') : '<div style="color:#666; text-align:center;">履歴なし</div>';
    }

    function downloadJSON() {
        const data = { stations: stationLogs, dailyHistory, totalDist, maxSpeed };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Railway_TripData.json`; a.click();
    }

    function clearLog() { if(confirm("全リセットしますか？")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
